<div class="unpaid-reminders">
  @for (reminder of unpaidReminders; track reminder.id) {
    <div class="unpaid-reminders__item">
    <div class="unpaid-reminders__content">
      <span class="unpaid-reminders__icon" aria-hidden="true">
        <img src="app/assets/icons/warning-icon.svg" alt="" class="w-5 h-5" />
      </span>
      <p class="unpaid-reminders__message">
        {{ reminder.message }}
      </p>
    </div>
    <button type="button" (click)="onPayNow(reminder)" class="unpaid-reminders__btn">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"/></svg>
      {{ "Pay Now" | translate }}
    </button>
    </div>
  }
</div>
