<!-- Skeleton -->
<ng-container *ngIf="loading; else pageContent">
  <section class="mx-auto max-w-[1335px] gap-4 flex flex-col px-4 animate-pulse mb-30">
    <!-- Hero skeleton -->
    <div class="rounded-2xl border border-[#E9E9E9] bg-white p-5 md:p-6 flex flex-col md:flex-row gap-6">
      <div class="flex-1 space-y-6 py-10">
        <div class="h-12 w-1/2 bg-slate-200 rounded"></div>
        <div class="h-7 w-3/4 bg-slate-200 rounded"></div>
        <div class="h-7 w-2/3 bg-slate-200 rounded"></div>
        <div class="flex gap-3 mt-4">
          <div class="h-8 w-24 bg-slate-200 rounded"></div>
          <div class="h-8 w-24 bg-slate-200 rounded"></div>
        </div>
      </div>
      <div class="w-full md:w-[280px] lg:w-[300px] h-[250px] lg:h-[250px] bg-slate-200 rounded-2xl"></div>
    </div>
    <!-- Quick Info skeleton -->
    <div class="rounded-2xl border border-[#E9E9E9] bg-white p-5 space-y-5 md:py-10">
      <div class="h-10 w-52 bg-slate-200 rounded"></div>
      <div class="h-5 w-3/4 bg-slate-200 rounded"></div>
      <div class="h-5 w-2/3 bg-slate-200 rounded"></div>
    </div>
    <!-- Chat skeleton -->
    <div class="rounded-3xl border border-[#D7E8F5] bg-white p-5 md:p-8 h-[400px]">
      <div class="h-10 w-40 bg-slate-200 rounded mb-4"></div>
      <div class="h-48 bg-slate-100 rounded"></div>
    </div>
    <!-- Related courses skeleton -->
    <div class="rounded-2xl p-5 space-y-5 w-full">
      <div class="mx-auto h-10 w-62 bg-slate-200 rounded"></div>
    </div>
    <div class="hidden xl:grid xl:grid-cols-3 gap-3 xl:gap-6 p-8">
      <div *ngFor="let _ of skeletonCount" class="rounded-xl overflow-hidden bg-white p-4">
        <ngx-skeleton-loader [theme]="{ height: '300px', width: '100%', borderRadius: '16px' }">
        </ngx-skeleton-loader>
        <ngx-skeleton-loader [theme]="{ height: '30px', width: '70%', margin: '10px auto' }">
        </ngx-skeleton-loader>
        <ngx-skeleton-loader [theme]="{ height: '40px', width: '100%', margin: '10px auto', borderRadius: '18px' }">
        </ngx-skeleton-loader>
      </div>
    </div>
  </section>
</ng-container>

<!-- Actual Page -->
<ng-template #pageContent>
  <div class="mx-auto max-w-[1335px] gap-4 flex flex-col px-4">
    <app-student-subject-hero [course]="course"></app-student-subject-hero>
    <app-quick-info [teacher]="course?.teacher?.name" [duration]="course?.duration" [schedule]="course?.schedule">
    </app-quick-info>
    @if(course?.curriculums?.length){
      <app-curriculum [curriculums]="course?.curriculums || []"></app-curriculum>
      }
    <app-chat></app-chat>
    @if(course?.allow_send_testimonial) {
      <app-teacher-rating [teacherId]="course?.teacher?.id" [courseId]="course?.id"></app-teacher-rating>
    }
  </div>
  <app-related-courses *ngIf="relatedCourses.length" [courses]="relatedCourses"></app-related-courses>
</ng-template>
