@if (loading) {

<!-- Skeleton Cards -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-5 w-full">

    @for (item of [1,2]; track item) {

    <div class="rounded-[22px] border border-[#E6EEF6] bg-white p-4 shadow-sm animate-pulse">

        <!-- Image -->
        <div class="w-full h-[220px] rounded-xl bg-gray-200 mb-4"></div>

        <!-- Title -->
        <div class="h-10 w-2/3 bg-gray-200 rounded-lg mx-auto mb-4"></div>

        <!-- Info lines -->
        <div class="space-y-3 mb-4">
            <div class="h-4 w-3/4 bg-gray-200 rounded"></div>
            <div class="h-4 w-2/3 bg-gray-200 rounded"></div>
            <div class="h-4 w-4/5 bg-gray-200 rounded"></div>
            <div class="h-4 w-1/2 bg-gray-200 rounded"></div>
        </div>

        <!-- Button -->
        <div class="h-12 w-full bg-gray-200 rounded-xl"></div>

    </div>

    }

</div>

}
@else if (!loading && materials.length === 0) {

<!-- Empty State -->
<div class="w-full rounded-[22px] border border-[#E6EEF6] bg-white p-8 text-center shadow-sm">

    <div class="mx-auto mb-4 flex h-14 w-14 items-center justify-center rounded-2xl bg-[#EAF3FF]">
        <img src="app/assets/icons/book.svg" class="h-7 w-7" />
    </div>

    <h3 class="text-xl font-bold text-[#0B3458]">
        {{ 'No registered courses yet' | translate }}
    </h3>

</div>

}
@else {

<!-- Cards Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-5 w-full">

    @for (material of materials; track material.course_id) {
    <app-material-card [material]="material"></app-material-card>
    }

</div>

}
