<div class="max-w-[1342px] mx-auto px-4">
    <app-breadcrumb [data]="breadcrumb"></app-breadcrumb>
</div>

<section class="max-w-[1400px] mx-auto px-4 py-12">
    <!-- Title -->
    <h2 class="text-4xl font-bold text-[#0B3458] mb-15 text-start">
        {{ sectionTitle || ('Our News' | translate) }}
    </h2>

    <!-- Skeleton -->
    <ng-container *ngIf="loading">
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-6 gap-8">
            <div *ngFor="let i of [0,1,2,3,4]" [ngClass]="{
                  'lg:col-span-3': i < 2,
                  'lg:col-span-2': i >= 2
                }" class="bg-white rounded-2xl shadow p-4 animate-pulse">
                <div class="h-48 bg-gray-200 rounded-xl mb-4"></div>
                <div class="h-4 w-24 bg-gray-200 rounded mb-3"></div>
                <div class="h-5 w-3/4 bg-gray-200 rounded mb-2"></div>
                <div class="h-5 w-1/2 bg-gray-200 rounded mb-4"></div>
                <div class="space-y-2 mb-4">
                    <div class="h-4 bg-gray-200 rounded"></div>
                    <div class="h-4 w-5/6 bg-gray-200 rounded"></div>
                </div>
                <div class="h-4 w-24 bg-gray-200 rounded"></div>
            </div>
        </div>
    </ng-container>

    <!-- Real content -->
    <ng-container *ngIf="!loading">
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-6 gap-8">
            <app-news-card *ngFor="let news of newsList; let i = index" [news]="news" [ngClass]="{
                  'lg:col-span-3': i < 2,
                  'lg:col-span-2': i >= 2
                }">
            </app-news-card>
        </div>
    </ng-container>
</section>
