<section class="max-w-full mx-auto py-12">

    <!-- Section Title -->
    <h2 class="text-3xl font-bold text-[#043458] mb-10 text-start">
        {{ "Related News" | translate }}
    </h2>

    <!-- Skeleton -->
    <div *ngIf="loading" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">

        <div *ngFor="let i of [1,2,3]" class="bg-white rounded-2xl shadow-sm overflow-hidden animate-pulse">

            <!-- Image (NO padding) -->
            <div class="w-full h-[300px] bg-gray-200 rounded-2xl "></div>

            <!-- Content -->
            <div class="p-4">

                <!-- Date -->
                <div class="h-4 w-24 bg-gray-200 rounded mb-3"></div>

                <!-- Title -->
                <div class="h-5 w-3/4 bg-gray-200 rounded mb-2"></div>
                <div class="h-5 w-2/3 bg-gray-200 rounded mb-4"></div>

                <!-- Button -->
                <div class="h-4 w-20 bg-gray-200 rounded"></div>

            </div>

        </div>

    </div>


    <!-- Cards -->
    <div *ngIf="!loading" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
        <app-news-card *ngFor="let item of relatedNews" [news]="item"></app-news-card>
    </div>

</section>
