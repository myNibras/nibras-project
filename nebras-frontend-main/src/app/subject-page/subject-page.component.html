<!-- Skeleton Page -->
<ng-container *ngIf="loading; else pageContent">
    <section class="mx-auto max-w-[1335px] gap-4 flex flex-col px-4 animate-pulse mb-30">
        <!-- Hero skeleton -->
        <div class="rounded-2xl border border-[#E9E9E9] bg-white p-5 md:p-6 flex flex-col md:flex-row gap-6">
            <div class="flex-1 space-y-6 py-10">
                <div class="h-12 w-1/2 bg-slate-200 rounded"></div>
                <div class="h-7 w-3/4 bg-slate-200 rounded"></div>
                <div class="h-7 w-2/3 bg-slate-200 rounded"></div>
                <div class="h-7 w-1/2 bg-slate-200 rounded"></div>

                <div class="flex gap-3 mt-4">
                    <div class="h-8 w-24 bg-slate-200 rounded"></div>
                    <div class="h-8 w-24 bg-slate-200 rounded"></div>
                </div>

                <div class="h-10 w-40 bg-slate-200 rounded mt-4"></div>
            </div>

            <div class="w-full md:w-[280px] lg:w-[400px] h-[250px] lg:h-[350px] bg-slate-200 rounded-2xl"></div>
        </div>

        <!-- Quick Info skeleton -->
        <div class="rounded-2xl border border-[#E9E9E9] bg-white p-5 space-y-5 md:py-10">
            <div class="h-10 w-52 bg-slate-200 rounded"></div>
            <div class="h-5 w-3/4 bg-slate-200 rounded"></div>
            <div class="h-5 w-2/3 bg-slate-200 rounded"></div>
            <div class="h-5 w-1/2 bg-slate-200 rounded"></div>
        </div>

        <!-- Description skeleton -->
        <div class="rounded-2xl border border-[#E9E9E9] bg-white p-5 space-y-5 md:py-10">
            <div class="h-10 w-52 bg-slate-200 rounded"></div>
            <div class="h-5 w-3/4 bg-slate-200 rounded"></div>
            <div class="h-5 w-2/3 bg-slate-200 rounded"></div>
            <div class="h-5 w-1/2 bg-slate-200 rounded"></div>
        </div>

        <!-- Curriculum skeleton -->
        <div class="rounded-2xl border border-[#E9E9E9] bg-white p-5 space-y-5 md:py-10 ">
            <div class="h-10 w-52 bg-slate-200 rounded"></div>
            <div class="h-5 w-3/4 bg-slate-200 rounded"></div>
            <div class="h-5 w-2/3 bg-slate-200 rounded"></div>
            <div class="h-5 w-1/2 bg-slate-200 rounded"></div>
        </div>

        <!-- Courses Skeleton -->
        <div class="rounded-2xl  p-5 space-y-5 w-full">
            <div class="mx-auto h-10 w-62 bg-slate-200 rounded"></div>
        </div>
        <!-- Desktop / XL Grid -->
        <div class="hidden xl:grid xl:grid-cols-3 gap-3 xl:gap-6 p-8">
            <div *ngFor="let _ of skeletonCount" class="rounded-xl overflow-hidden bg-white p-4">
                <ngx-skeleton-loader
                    [theme]="{ height: '300px', width: '100%',  borderRadius: '16px' }"></ngx-skeleton-loader>
                <ngx-skeleton-loader
                    [theme]="{ height: '30px', width: '70%', margin: '10px auto' }"></ngx-skeleton-loader>
                <ngx-skeleton-loader
                    [theme]="{ height: '30px', width: '70%', margin: '10px auto' }"></ngx-skeleton-loader>
                <ngx-skeleton-loader
                    [theme]="{ height: '40px', width: '100%', margin: '10px auto' , borderRadius: '18px' }"></ngx-skeleton-loader>
            </div>
        </div>

        <!-- Mobile / Tablet / Laptop Slider -->
        <div class="flex xl:hidden gap-3 overflow-x-auto scrollbar-hide snap-x snap-mandatory p-4">
            <div *ngFor="let _ of skeletonCount"
                class="rounded-xl overflow-hidden bg-white/70 flex-shrink-0 w-[85%] sm:w-[45%] snap-start p-2">
                <ngx-skeleton-loader
                    [theme]="{ height: '300px', width: '100%',  borderRadius: '16px' }"></ngx-skeleton-loader>
                <ngx-skeleton-loader
                    [theme]="{ height: '30px', width: '70%', margin: '10px auto' }"></ngx-skeleton-loader>
                <ngx-skeleton-loader
                    [theme]="{ height: '30px', width: '70%', margin: '10px auto' }"></ngx-skeleton-loader>
                <ngx-skeleton-loader
                    [theme]="{ height: '40px', width: '100%', margin: '10px auto' , borderRadius: '18px' }"></ngx-skeleton-loader>
            </div>
        </div>
    </section>
</ng-container>

<!-- Actual Page -->
<ng-template #pageContent>
    <div class="mx-auto max-w-[1335px] gap-4 flex flex-col px-4">
        <app-breadcrumb [data]="breadcrumb" />
        <app-hero [course_id]="course?.id" [title]="course?.title" [image]="course?.image"
            [short_description]="course?.short_description" [price]="course?.price"
            [discount_price]="course?.discount_price" [class]="course?.class" [payment_type]="course?.payment_type"
            [semester_months]="course?.semester_months" [monthly_amount]="course?.monthly_amount"
            [course_type]="course?.course_type" [available_seats]="course?.available_seats"
            [final_available_seats]="course?.final_available_seats" [purchase]="course?.purchased">
        </app-hero>

        <app-quick-info [teacher]="course?.teacher?.name" [duration]="course?.duration" [schedule]="course?.schedule">
        </app-quick-info>

        @if(course?.curriculums?.length){
        <app-curriculum [curriculums]="course?.curriculums || []"></app-curriculum>
        }
    </div>

    <app-related-courses [courses]="relatedCourses"></app-related-courses>
</ng-template>
