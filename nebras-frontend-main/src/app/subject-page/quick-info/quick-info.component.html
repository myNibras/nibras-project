<!-- QUICK INFO (Flex Version – same content, no direction changes) -->
<section class="rounded-2xl border border-[#E9E9E9] bg-white p-5 md:p-6">
    <div class="lg:px-5 md:px-2 pb-5">
        <h2 class="lg:text-4xl text-[24px] md:text-[32px] font-bold text-[#043458]">
            {{ "Quick Info" | translate }}
        </h2>

        <!-- Info row -->
        <div class="mt-4 flex flex-wrap items-start justify-between gap-x-8 gap-y-3
                text-[#545F71] text-sm md:text-base lg:text-lg">

            <!-- Teacher -->
            <div class="flex items-start gap-2">
                <!-- icon -->
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    class="h-4 w-4 text-[#1396FD] mt-0.5">
                    <circle cx="12" cy="8" r="4" />
                    <path d="M6 20c0-3.333 2.667-6 6-6s6 2.667 6 6" />
                </svg>

                <!-- label + value -->
                <span class="text-[#1396FD] font-medium whitespace-nowrap">
                    {{ "Teacher" | translate }} :
                </span>
                <span>
                    {{ teacher }}
                </span>
            </div>

            <!-- Duration -->
            <div class="flex items-start gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-[#1396FD] mt-0.5" fill="none"
                    viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>

                <span class="text-[#1396FD] font-medium whitespace-nowrap">
                    {{ "Duration" | translate }} :
                </span>
                <span>
                    {{ duration }}
                </span>
            </div>

            <!-- Schedule -->
            <div class="flex items-start gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-[#1396FD] mt-0.5" fill="none"
                    viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                </svg>

                <span class="text-[#1396FD] font-medium whitespace-nowrap">
                    {{ "Schedule" | translate }} :
                </span>
                <span>
                    {{ schedule }}
                </span>
            </div>

        </div>
    </div>
</section>
