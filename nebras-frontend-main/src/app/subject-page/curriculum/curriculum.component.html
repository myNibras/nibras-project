<!-- CURRICULUM -->
<section class="rounded-2xl border border-[#E9E9E9] bg-white p-5 md:p-6 mt-6">
    <div class="lg:px-5 md:px-2 pb-5">

        <!-- Title -->
        <h2 class="lg:text-4xl text-[24px] md:text-[32px] font-bold text-[#043458]">
            {{ "Curriculum" | translate }}
        </h2>

        <div class="mt-6">

            <div *ngFor="let curriculum of curriculums; let i = index" class=" py-5">

                <!-- Header -->
                <div class="flex items-start justify-between cursor-pointer" (click)="toggleCurriculum(i)">

                    <div class="flex flex-col gap-1">
                        <!-- Main title -->
                        <p class="text-[#043458] font-semibold text-base md:text-lg lg:text-xl">
                            {{ curriculum.title }}
                        </p>
                    </div>

                    <!-- Toggle -->
                    <button type="button" aria-label="toggle curriculum"
                        class="text-[#8CA0B3] text-2xl md:text-3xl leading-none select-none">
                        <span *ngIf="openIndex !== i">+</span>
                        <span *ngIf="openIndex === i">−</span>
                    </button>
                </div>

                <!-- Units -->
                <div *ngIf="openIndex === i" class="mt-4">
                    <ul class="space-y-2 text-[#043458] text-sm md:text-base lg:text-lg leading-relaxed">
                        <li *ngFor="let unit of curriculum.units">
                            {{ unit.title }}
                            <a *ngIf="unit.link" [href]="unit.link"
                                [target]="unit.open_in_new_tab === false ? '_self' : '_blank'"
                                [attr.rel]="unit.open_in_new_tab === false ? null : 'noopener noreferrer'"
                                class=" mt-1 text-blue-600 underline text-sm md:text-base lg:text-lg leading-relaxed">
                                {{ 'View lesson link' | translate }}
                            </a>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</section>
