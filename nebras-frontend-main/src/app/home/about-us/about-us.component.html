<section id="about-us" class="relative bg-[#031F34] text-white overflow-hidden ">
    <div class="container mx-auto">
        <!-- Decorative arcs bg -->
        <img src="app/assets/images/about-us/about-us-logo-overlay.svg" alt="" aria-hidden="true"
            class="pointer-events-none select-none absolute right-0 top-0 z-0 w-auto max-w-none" />
        <!-- Content -->
        <div class="relative mx-auto px-8 xl:px-22 
                py-10 md:py-16 lg:py-20
                flex flex-col lg:flex-row items-start lg:items-center gap-8 md:gap-12">

            <!-- Left -->
            <div class="flex-1 w-full">
                <img src="app/assets/images/about-us/logo.svg" alt="" class="mb-6 mt-3 md:mt-0 w-10 ">
                <h1 class="font-extrabold leading-tight mb-4 md:mb-6
                text-start text-3xl md:text-5xl lg:text-4xl ">
                    {{"about us title" |translate}}
                </h1>

                <p class="text-gray-300 text-start
                text-base  md:text-2xl lg:text-xl">
                    {{"about us descreption" | translate}}
                </p>
            </div>

            <!-- Right -->
            <div class="flex-1 w-full lg:mt-0">
                <img src="app/assets/images/about-us/dashboard.png" alt="Dashboard preview"
                    class="rounded-2xl shadow-2xl w-full mx-auto" />
            </div>
        </div>
    </div>
</section>
