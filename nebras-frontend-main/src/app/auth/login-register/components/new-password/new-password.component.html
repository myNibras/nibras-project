<div class="min-h-screen flex flex-col py-5 items-center justify-start bg-[#F5F8FB] px-4">

    <!-- Page Title -->
    <h1 class="text-[#043458] text-3xl md:text-4xl font-bold mb-8">
        {{ 'newPassword title' | translate }}
    </h1>

    <div class="w-full max-w-md bg-white p-8 rounded-2xl shadow-lg">

        <div class="space-y-6" [formGroup]="form">

            <!-- New Password -->
            <div class="relative">
                <label class="block text-[#043458] md:text-[18px] text-[16px] font-medium">
                    {{ 'newPassword label' | translate }}
                </label>

                <div class="mt-1 relative">
                    <input [type]="showNewPassword ? 'text' : 'password'" formControlName="password"
                        [placeholder]="'newPassword placeholder' | translate"
                        class="w-full rounded-xl text-[14px] text-[#545F71] border border-[#D7DEE4] px-5 py-3 ltr:pr-10 rtl:pl-10" />

                    <button type="button" (click)="toggleNewPassword()"
                        class="absolute inset-y-0 rtl:left-3 ltr:right-3 my-auto h-6 w-6 grid place-items-center text-[#545F71]/80 hover:text-[#043458]"
                        aria-label="Toggle password visibility">

                        <!-- Eye -->
                        <svg *ngIf="!showNewPassword" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none"
                            viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                            <circle cx="12" cy="12" r="3" />
                        </svg>

                        <!-- Eye Off -->
                        <svg *ngIf="showNewPassword" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none"
                            viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M3 3l18 18M10.584 10.59A3 3 0 0113.41 13.41M9.88 4.24A9.94 9.94 0 0112 4c4.477 0 8.268 2.943 9.542 7a9.98 9.98 0 01-2.102 3.368M6.61 6.61C4.7 7.81 3.3 9.67 2.458 12c1.274 4.057 5.065 7 9.542 7 1.1 0 2.165-.18 3.166-.514" />
                        </svg>

                    </button>
                </div>

                <p *ngIf="form.get('password')?.touched && form.get('password')?.hasError('required')"
                    class="text-red-500 text-sm mt-1">
                    {{ 'newPassword errorRequired' | translate }}
                </p>

                <p *ngIf="form.get('password')?.touched && form.get('password')?.hasError('minlength')"
                    class="text-red-500 text-sm mt-1">
                    {{ 'newPassword errorMinLength' | translate }}
                </p>
            </div>

            <!-- Confirm Password -->
            <div class="relative">
                <label class="block text-[#043458] md:text-[18px] text-[16px] font-medium">
                    {{ 'confirmPassword label' | translate }}
                </label>

                <div class="mt-1 relative">
                    <input [type]="showConfirmPassword ? 'text' : 'password'" formControlName="confirmPassword"
                        [placeholder]="'confirmPassword placeholder' | translate"
                        class="w-full rounded-xl text-[14px] text-[#545F71] border border-[#D7DEE4] px-5 py-3 ltr:pr-10 rtl:pl-10" />

                    <button type="button" (click)="toggleConfirmPassword()"
                        class="absolute inset-y-0 rtl:left-3 ltr:right-3 my-auto h-6 w-6 grid place-items-center text-[#545F71]/80 hover:text-[#043458]"
                        aria-label="Toggle password visibility">

                        <!-- Eye -->
                        <svg *ngIf="!showConfirmPassword" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none"
                            viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                            <circle cx="12" cy="12" r="3" />
                        </svg>

                        <!-- Eye Off -->
                        <svg *ngIf="showConfirmPassword" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none"
                            viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M3 3l18 18M10.584 10.59A3 3 0 0113.41 13.41M9.88 4.24A9.94 9.94 0 0112 4c4.477 0 8.268 2.943 9.542 7a9.98 9.98 0 01-2.102 3.368M6.61 6.61C4.7 7.81 3.3 9.67 2.458 12c1.274 4.057 5.065 7 9.542 7 1.1 0 2.165-.18 3.166-.514" />
                        </svg>

                    </button>
                </div>

                <p *ngIf="form.get('confirmPassword')?.touched && form.get('confirmPassword')?.hasError('required')"
                    class="text-red-500 text-sm mt-1">
                    {{ 'confirmPassword errorRequired' | translate }}
                </p>

                <p *ngIf="form.hasError('mismatch') && form.get('confirmPassword')?.touched"
                    class="text-red-500 text-sm mt-1">
                    {{ 'confirmPassword errorMismatch' | translate }}
                </p>
            </div>

            <!-- Error -->
            <p *ngIf="errorMessage" class="text-red-600 text-sm text-center">
                {{ errorMessage }}
            </p>

            <!-- Continue Button -->
            <button type="button" (click)="onContinueClick()" [disabled]="form.invalid || loading" class="w-full rounded-[14px] font-bold py-3 bg-[#0D3C63] text-white
                       disabled:bg-gray-400 disabled:text-gray-200 disabled:cursor-not-allowed">

                <img src="app/assets/images/shared/loader-white.gif" class="w-6 mx-auto" *ngIf="loading">

                <span *ngIf="!loading">
                    {{ 'continue' | translate }}
                </span>
            </button>

        </div>

    </div>
</div>
