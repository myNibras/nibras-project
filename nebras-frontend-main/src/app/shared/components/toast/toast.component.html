<div class="fixed top-6 inset-x-0 z-[100] flex flex-col items-center gap-3 px-4 pointer-events-none">
  <div *ngFor="let t of toastService.toasts(); trackBy: trackById"
    class="toast-card pointer-events-auto max-w-md w-full shadow-xl rounded-2xl px-5 py-4 flex items-start gap-3 bg-white border"
    [ngClass]="{
      'border-emerald-200': t.kind === 'success',
      'border-rose-200': t.kind === 'error',
      'border-amber-200': t.kind === 'warn',
      'border-sky-200': t.kind === 'info'
    }"
    role="status" aria-live="polite">

    <span class="shrink-0 mt-0.5 text-2xl leading-none"
      [ngClass]="{
        'text-emerald-500': t.kind === 'success',
        'text-rose-500': t.kind === 'error',
        'text-amber-500': t.kind === 'warn',
        'text-sky-500': t.kind === 'info'
      }">
      <ng-container [ngSwitch]="t.kind">
        <span *ngSwitchCase="'success'">✨</span>
        <span *ngSwitchCase="'error'">⚠️</span>
        <span *ngSwitchCase="'warn'">⚠️</span>
        <span *ngSwitchDefault>ℹ️</span>
      </ng-container>
    </span>

    <div class="flex-1 min-w-0">
      <p *ngIf="t.title" class="text-[#043458] font-semibold text-base">{{ t.title }}</p>
      <p class="text-[#475569] text-sm leading-relaxed mt-0.5">{{ t.message }}</p>
    </div>

    <button (click)="toastService.dismiss(t.id)"
      class="text-gray-400 hover:text-gray-700 shrink-0 transition"
      aria-label="Dismiss">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
      </svg>
    </button>
  </div>
</div>
