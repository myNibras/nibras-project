<!-- Backdrop -->
<div *ngIf="open" id="ty-backdrop"
    class="fixed inset-0 z-[100] bg-slate-900/40 backdrop-blur-sm flex items-center justify-center"
    (click)="onBackdropClick($event)" role="dialog" aria-modal="true" aria-labelledby="ty-title"
    [attr.dir]="isRTL ? 'rtl' : 'ltr'">
    <!-- Panel -->
    <div class="relative md:w-[550px] w-[300px]  rounded-[26px] bg-[#EEF7FF] shadow-xl border border-[#E6EEF6]
        md:py-5 md:px-10 p-5 transition transform duration-150 ease-out scale-100">
        <!-- Close button -->
        <button *ngIf="showClose" type="button" (click)="close()" class="absolute top-3 md:top-4 end-3 md:end-4 grid place-items-center w-9 h-9 rounded-full
                hover:bg-white/70 focus:outline-none focus:ring focus:ring-slate-300" aria-label="Close">
            <span class="block text-2xl leading-none text-[#043458]">&times;</span>
        </button>

        <!-- Illustration -->
        <div class="flex justify-center">
            <div class="w-[235px] h-[117px] md:w-[349px] md:h-[172px]">
                <img src="app/assets/images/shared/thank-you.png" alt="Thank You"
                    class="w-full h-full select-none object-cover select-none" />
            </div>

        </div>

        <!-- Title -->
        <h2 id="ty-title" class="text-center text-[#043458] font-bold text-xl md:text-3xl ">
            {{ "thank_you_title" | translate }}
        </h2>

        <!-- Message -->
        <p class="mt-3 md:mt-4 text-center text-[#545F71] font-normal text-base md:text-lg leading-relaxed">
            {{ "thank_you_message" | translate}}
        </p>

        <!-- CTA -->
        <div class="mt-6 md:mt-8 flex justify-center">
            <button type="button" (click)="close()" class="w-full px-7 md:px-10 py-3 rounded-[16px] bg-[#66D86E] text-white text-[14px] md:text-[20px] 
                font-semibold md:font-bold shadow hover:opacity-95 focus:outline-none focus:ring focus:ring-green-200">
                {{ primaryLabel }}
            </button>
        </div>
    </div>
</div>
