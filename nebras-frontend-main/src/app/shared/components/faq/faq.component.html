<section class="relative bg-[#F1F9FF] py-20 overflow-hidden">

    <!-- Decorative Logo / Pattern -->
    <img src="app/assets/images/faq/union-logo-faq.png" alt="FAQ Pattern" class="absolute top-0 h-full opacity-40 pointer-events-none
               ltr:right-0 rtl:left-0" />

    <!-- Content Wrapper -->
    <div class="relative max-w-[912px] mx-auto px-4">

        <!-- SKELETON -->
        <ng-container *ngIf="loading; else faqContent">

            <!-- Section Title Skeleton -->
            <div class="flex justify-center mb-12">
                <div class="h-10 w-72 bg-[#E6EEF6] rounded-xl animate-pulse"></div>
            </div>

            <!-- FAQ Skeleton List -->
            <div class="space-y-4">
                <div *ngFor="let i of [1,2,3,4]" class="w-full h-[64px] rounded-2xl bg-white border border-[#F2F2F7]
                           flex items-center justify-between px-6 animate-pulse">

                    <div class="h-5 w-3/4 bg-[#E6EEF6] rounded-lg"></div>
                    <div class="w-5 h-5 bg-[#E6EEF6] rounded"></div>
                </div>
            </div>

        </ng-container>

        <!-- REAL CONTENT -->
        <ng-template #faqContent>

            <!-- Section Title -->
            <h2 *ngIf="showSectionTitle" class="text-3xl font-bold text-center text-[#043458] mb-5">
                {{ faqSection?.section_title }}
            </h2>

            <!-- Empty state -->
            <div *ngIf="faqs.length === 0"
                class="text-center text-base md:text-lg text-[#545F71] py-10">
                {{ 'No FAQs available at the moment.' | translate }}
            </div>

            <!-- FAQ List -->
            <div *ngIf="faqs.length > 0" class="space-y-4">

                <div *ngFor="let faq of faqs; let i = index"
                    class="w-full rounded-2xl bg-white border transition-all duration-300 ease-in-out overflow-hidden"
                    [ngClass]="faq.open
                      ? 'border-[#9BA5B7] shadow-[0px_5px_16px_0px_#080F340F]'
                      : 'border-[#F2F2F7]'">

                    <button type="button" (click)="toggle(i)"
                        class="w-full flex items-center justify-between px-6 py-4 text-start">

                        <span class="text-base md:text-xl font-bold text-[#043458]">
                            {{ faq.question }}
                        </span>

                        <img src="app/assets/images/faq/faq-arrow.svg" alt="Toggle"
                            class="transition-transform duration-300" [ngClass]="faq.open
                              ? 'rtl:-rotate-90 ltr:-rotate-90'
                              : 'rtl:rotate-0 ltr:-rotate-180'" />
                    </button>

                    <div *ngIf="faq.open" class="px-6 pb-6 text-sm md:text-base text-[#545F71] leading-relaxed
                               transition-all duration-300">
                        {{ faq.answer }}
                    </div>

                </div>

            </div>

            <!-- "View All FAQs" CTA (only shown when limited and more exist) -->
            <div *ngIf="showViewAllLink" class="flex justify-center mt-12">
                <a [routerLink]="faqPageRoute"
                   class="inline-flex items-center gap-2 px-10 py-4 rounded-xl text-base md:text-lg font-semibold
                          text-white bg-gradient-to-r from-[#09528A] to-[#043458]
                          hover:opacity-90 transition-opacity">
                    {{ 'View All FAQs' | translate }}
                    <span class="ltr:inline rtl:hidden">→</span>
                    <span class="ltr:hidden rtl:inline">←</span>
                </a>
            </div>

        </ng-template>

    </div>

</section>
