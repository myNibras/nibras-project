<app-hero-banner title="Privacy Policy" subtitle="Privacy Intro"></app-hero-banner>

<section class="max-w-4xl mx-auto px-6 pt-8 pb-16">

  <ul class="space-y-4">
    <li *ngFor="let s of sections"
      class="bg-white border border-[#E1ECF5] rounded-2xl px-6 py-5 shadow-[0_4px_18px_rgba(15,23,42,0.04)]
             hover:shadow-[0_10px_28px_rgba(15,23,42,0.06)] transition flex gap-4">

      <span class="shrink-0 inline-flex items-center justify-center w-10 h-10 rounded-xl bg-[#EFF6FF] text-[#1396FD]">
        <ng-container [ngSwitch]="s.icon">
          <svg *ngSwitchCase="'database'" class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
            <ellipse cx="12" cy="6" rx="8" ry="3" /><path d="M4 6v6c0 1.7 3.6 3 8 3s8-1.3 8-3V6" /><path d="M4 12v6c0 1.7 3.6 3 8 3s8-1.3 8-3v-6" />
          </svg>
          <svg *ngSwitchCase="'check'" class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
          </svg>
          <svg *ngSwitchCase="'shield'" class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 3l8 4v5c0 5-3.5 8.4-8 9-4.5-.6-8-4-8-9V7l8-4z" />
          </svg>
          <svg *ngSwitchCase="'clock'" class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="9" /><path stroke-linecap="round" d="M12 7v5l3 2" />
          </svg>
          <svg *ngSwitchCase="'user'" class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M5.121 17.804A8.962 8.962 0 0112 15c2.486 0 4.735.998 6.364 2.636M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
          </svg>
        </ng-container>
      </span>

      <p class="text-[#1f2937] text-base md:text-[17px] leading-relaxed">
        {{ s.key | translate }}
      </p>
    </li>
  </ul>

  <div class="mt-8 inline-flex items-center gap-2 bg-[#FFF7ED] border border-[#FED7AA] text-[#9A3412] rounded-2xl px-5 py-3 font-semibold">
    <svg class="w-5 h-5 text-[#EA580C]" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="9" /><path stroke-linecap="round" d="M12 8v4M12 16h.01" />
    </svg>
    {{ 'Privacy Last update' | translate }}
  </div>

</section>
